<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080810;
    --surface:  #0f0f1c;
    --card:     #141428;
    --border:   #1e1e38;
    --accent:   #6ee7f7;
    --accent2:  #ff6b8a;
    --accent3:  #a78bfa;
    --text:     #e8e8f0;
    --muted:    #5a5a78;
    --success:  #4ade80;
    --warning:  #fbbf24;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(110,231,247,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110,231,247,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── GLOWING ORB ── */
  body::after {
    content: '';
    position: fixed; top: -20vh; left: -10vw;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(110,231,247,.06) 0%, transparent 70%);
    border-radius: 50%; z-index: 0; pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  @keyframes drift { from{transform:translate(0,0)} to{transform:translate(4vw,3vh)} }

  /* ── LAYOUT ── */
  .shell { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 28px 60px; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 36px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 46px; height: 46px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    display: grid; place-items: center; font-size: 22px;
    box-shadow: 0 0 20px rgba(110,231,247,.3);
  }
  .logo h1 {
    font-family: 'Syne', sans-serif; font-size: 1.5rem;
    font-weight: 800; letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .month-badge {
    font-size: .75rem; color: var(--muted); letter-spacing: .08em;
    text-transform: uppercase; border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px;
  }

  /* ── STAT CARDS ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 36px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 22px 24px;
    position: relative; overflow: hidden;
    transition: border-color .2s, transform .2s;
    animation: fadeUp .5s ease both;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .stat-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(110,231,247,.04));
    pointer-events: none;
  }
  .stat-card:nth-child(1) { animation-delay: .05s; }
  .stat-card:nth-child(2) { animation-delay: .10s; }
  .stat-card:nth-child(3) { animation-delay: .15s; }
  .stat-card:nth-child(4) { animation-delay: .20s; }
  .stat-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.85rem; font-weight: 700; }
  .stat-value.accent  { color: var(--accent); }
  .stat-value.accent2 { color: var(--accent2); }
  .stat-value.accent3 { color: var(--accent3); }
  .stat-value.warn    { color: var(--warning); }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid; grid-template-columns: 380px 1fr; gap: 24px;
    align-items: start;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px; overflow: hidden;
    animation: fadeUp .5s ease .25s both;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 26px; border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-family: 'Syne', sans-serif; font-size: .95rem;
    font-weight: 700; letter-spacing: .02em;
  }
  .panel-badge {
    font-size: .65rem; background: rgba(110,231,247,.1);
    color: var(--accent); border: 1px solid rgba(110,231,247,.2);
    padding: 4px 10px; border-radius: 10px; letter-spacing: .06em;
  }

  /* ── FORM ── */
  .form-body { padding: 24px 26px; display: flex; flex-direction: column; gap: 16px; }
  .field-group { display: flex; flex-direction: column; gap: 7px; }
  .field-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .field-input, .field-select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 12px 15px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: .85rem;
    transition: border-color .2s, box-shadow .2s; outline: none;
  }
  .field-input:focus, .field-select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,231,247,.1);
  }
  .field-select option { background: var(--card); }
  .amount-wrap { position: relative; }
  .amount-wrap .currency {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--accent); font-weight: 500;
  }
  .amount-wrap .field-input { padding-left: 30px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border: none; border-radius: 12px; padding: 14px;
    color: #080810; font-family: 'Syne', sans-serif;
    font-size: .9rem; font-weight: 700; cursor: pointer;
    transition: opacity .2s, transform .15s; letter-spacing: .03em;
    margin-top: 4px;
  }
  .btn-add:hover { opacity: .9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* ── CATEGORY PILLS ── */
  .cat-grid { padding: 20px 26px; display: flex; flex-direction: column; gap: 10px; }
  .cat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    transition: border-color .2s;
  }
  .cat-row:hover { border-color: var(--border); }
  .cat-left { display: flex; align-items: center; gap: 10px; font-size: .8rem; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-amount { font-size: .8rem; color: var(--accent); font-weight: 500; }
  .cat-bar-wrap {
    height: 3px; background: var(--border); border-radius: 2px;
    margin-top: 6px; overflow: hidden;
  }
  .cat-bar { height: 100%; border-radius: 2px; transition: width .6s ease; }

  /* ── EXPENSE LIST ── */
  .right-panel { display: flex; flex-direction: column; gap: 24px; }

  .list-controls {
    display: flex; align-items: center; gap: 12px; padding: 16px 26px;
    border-bottom: 1px solid var(--border);
  }
  .month-filter {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 8px 13px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: .8rem; outline: none;
    transition: border-color .2s;
  }
  .month-filter:focus { border-color: var(--accent); }
  .btn-report {
    margin-left: auto; background: rgba(167,139,250,.15);
    border: 1px solid rgba(167,139,250,.3); color: var(--accent3);
    border-radius: 9px; padding: 8px 16px;
    font-family: 'DM Mono', monospace; font-size: .78rem;
    cursor: pointer; transition: background .2s;
  }
  .btn-report:hover { background: rgba(167,139,250,.25); }

  .expense-list { padding: 0 26px 20px; display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
  .expense-list::-webkit-scrollbar { width: 4px; }
  .expense-list::-webkit-scrollbar-track { background: transparent; }
  .expense-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .expense-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 13px;
    background: var(--surface); border: 1px solid var(--border);
    transition: border-color .2s, transform .15s;
    animation: fadeIn .3s ease both;
  }
  .expense-item:hover { border-color: #2a2a48; transform: translateX(3px); }
  .expense-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-desc { font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .expense-meta { font-size: .7rem; color: var(--muted); }
  .expense-amount { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; color: var(--accent2); }
  .btn-del {
    background: none; border: 1px solid transparent; border-radius: 8px;
    color: var(--muted); cursor: pointer; padding: 5px 8px; font-size: .85rem;
    transition: color .2s, border-color .2s;
  }
  .btn-del:hover { color: var(--accent2); border-color: rgba(255,107,138,.3); }

  .empty-state { padding: 48px 26px; text-align: center; color: var(--muted); font-size: .85rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── REPORT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(8,8,16,.85);
    backdrop-filter: blur(8px); z-index: 100;
    display: none; place-items: center; padding: 20px;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 24px; padding: 30px; max-width: 960px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
  .btn-close {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 9px; padding: 7px 13px;
    cursor: pointer; font-size: .8rem; transition: color .2s;
  }
  .btn-close:hover { color: var(--text); }
  #report-img { width: 100%; border-radius: 14px; border: 1px solid var(--border); }
  .report-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
  .btn-gen {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none; border-radius: 10px; padding: 10px 22px;
    color: #080810; font-family: 'Syne', sans-serif; font-size: .85rem;
    font-weight: 700; cursor: pointer; transition: opacity .2s;
  }
  .btn-gen:hover { opacity: .85; }
  .spinner {
    width: 22px; height: 22px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; display: none;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    background: var(--card); border: 1px solid var(--success);
    color: var(--success); border-radius: 12px; padding: 13px 20px;
    font-size: .83rem; transform: translateY(80px); opacity: 0;
    transition: transform .3s ease, opacity .3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* ── RESPONSIVE ── */
  @media(max-width:900px) {
    .main-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
  @media(max-width:500px) {
    .stats-row { grid-template-columns: 1fr; }
    .form-row  { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">💸</div>
      <h1>Expense<span>Track</span></h1>
    </div>
    <div class="month-badge" id="current-month-badge">Loading…</div>
  </header>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Spent (All Time)</div>
      <div class="stat-value accent" id="stat-total">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value accent2" id="stat-month">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Transactions</div>
      <div class="stat-value accent3" id="stat-count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Category</div>
      <div class="stat-value warn" id="stat-top" style="font-size:1rem;margin-top:6px">—</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: ADD FORM + CATEGORIES -->
    <div style="display:flex;flex-direction:column;gap:24px">

      <!-- ADD FORM -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Add Expense</span>
          <span class="panel-badge">NEW</span>
        </div>
        <div class="form-body">
          <div class="field-group">
            <label class="field-label">Amount</label>
            <div class="amount-wrap">
              <span class="currency">₹</span>
              <input class="field-input" id="inp-amount" type="number" min="0.01" step="0.01" placeholder="0.00"/>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Category</label>
            <select class="field-select" id="inp-category"></select>
          </div>
          <div class="field-group">
            <label class="field-label">Description</label>
            <input class="field-input" id="inp-desc" type="text" placeholder="Optional note…"/>
          </div>
          <div class="form-row">
            <div class="field-group">
              <label class="field-label">Date</label>
              <input class="field-input" id="inp-date" type="date"/>
            </div>
          </div>
          <button class="btn-add" onclick="addExpense()">+ Add Expense</button>
        </div>
      </div>

      <!-- CATEGORY BREAKDOWN -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Category Breakdown</span>
          <span class="panel-badge">ALL TIME</span>
        </div>
        <div class="cat-grid" id="cat-grid">
          <div style="color:var(--muted);font-size:.8rem;padding:8px 0">No data yet.</div>
        </div>
      </div>

    </div>

    <!-- RIGHT: EXPENSE LIST -->
    <div class="right-panel">
      <div class="panel" style="animation-delay:.3s">
        <div class="panel-header">
          <span class="panel-title">Transactions</span>
          <span class="panel-badge" id="list-count-badge">0 entries</span>
        </div>
        <div class="list-controls">
          <input class="month-filter" type="month" id="month-filter"/>
          <button class="btn-report" onclick="openReport()">📊 Visual Report</button>
        </div>
        <div class="expense-list" id="expense-list">
          <div class="empty-state">
            <div class="empty-icon">🧾</div>
            No expenses recorded yet.
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">📊 Monthly Visual Report</span>
      <button class="btn-close" onclick="closeReport()">✕ Close</button>
    </div>
    <div class="report-controls">
      <input class="month-filter" type="month" id="report-month"/>
      <button class="btn-gen" onclick="generateReport()">Generate Report</button>
      <div class="spinner" id="spinner"></div>
    </div>
    <div id="report-output"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✔ Expense added!</div>

<script>
const COLORS = {
  "Food & Dining":"#FF6B6B","Transport":"#4ECDC4",
  "Housing & Utilities":"#45B7D1","Health & Medical":"#96CEB4",
  "Shopping":"#FFEAA7","Entertainment":"#DDA0DD",
  "Education":"#98D8C8","Travel":"#F7DC6F",
  "Personal Care":"#F0A500","Others":"#B2BEB5"
};

// ── Init ──────────────────────────────────────
const today = new Date();
const todayStr = today.toISOString().slice(0,10);
const monthStr = todayStr.slice(0,7);

document.getElementById("inp-date").value = todayStr;
document.getElementById("month-filter").value = monthStr;
document.getElementById("report-month").value = monthStr;
document.getElementById("current-month-badge").textContent =
  today.toLocaleDateString("en-IN",{month:"long",year:"numeric"});

// Populate category select
fetch("/api/categories").then(r=>r.json()).then(cats=>{
  const sel = document.getElementById("inp-category");
  cats.forEach(c=>{
    const o = document.createElement("option"); o.value=o.textContent=c; sel.appendChild(o);
  });
});

// ── Load everything ───────────────────────────
async function loadAll() {
  await Promise.all([loadExpenses(), loadSummary()]);
}

async function loadExpenses() {
  const month = document.getElementById("month-filter").value;
  const url = month ? `/api/expenses?month=${month}` : "/api/expenses";
  const data = await fetch(url).then(r=>r.json());
  renderList(data);
}

async function loadSummary() {
  const s = await fetch("/api/summary").then(r=>r.json());
  document.getElementById("stat-total").textContent = fmt(s.total||0);
  document.getElementById("stat-count").textContent = s.count||0;

  const monthKey = monthStr;
  const monthTotal = (s.monthly||{})[monthKey]||0;
  document.getElementById("stat-month").textContent = fmt(monthTotal);

  const cats = s.by_category||{};
  const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("stat-top").textContent = topCat ? topCat[0].split(" ")[0] : "—";

  renderCategories(cats);
}

// ── Render list ───────────────────────────────
function renderList(items) {
  const el = document.getElementById("expense-list");
  document.getElementById("list-count-badge").textContent = `${items.length} entries`;
  if(!items.length){
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div>No expenses for this period.</div>`;
    return;
  }
  const sorted = [...items].sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(e=>`
    <div class="expense-item" id="ei-${e.id}">
      <div class="expense-dot" style="background:${COLORS[e.category]||'#888'}"></div>
      <div class="expense-info">
        <div class="expense-desc">${e.description}</div>
        <div class="expense-meta">${e.category} · ${e.date}</div>
      </div>
      <div class="expense-amount">${fmt(e.amount)}</div>
      <button class="btn-del" onclick="deleteExpense(${e.id})" title="Delete">✕</button>
    </div>
  `).join("");
}

// ── Render categories ─────────────────────────
function renderCategories(cats) {
  const total = Object.values(cats).reduce((a,b)=>a+b,0)||1;
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const el = document.getElementById("cat-grid");
  if(!sorted.length){ el.innerHTML=`<div style="color:var(--muted);font-size:.8rem">No data yet.</div>`; return; }
  el.innerHTML = sorted.map(([cat,amt])=>`
    <div>
      <div class="cat-row">
        <div class="cat-left">
          <div class="cat-dot" style="background:${COLORS[cat]||'#888'}"></div>
          <span>${cat}</span>
        </div>
        <span class="cat-amount">${fmt(amt)}</span>
      </div>
      <div class="cat-bar-wrap">
        <div class="cat-bar" style="width:${(amt/total*100).toFixed(1)}%;background:${COLORS[cat]||'#888'}"></div>
      </div>
    </div>
  `).join("");
}

// ── Add expense ───────────────────────────────
async function addExpense() {
  const amount = parseFloat(document.getElementById("inp-amount").value);
  const category = document.getElementById("inp-category").value;
  const description = document.getElementById("inp-desc").value.trim()||"—";
  const date = document.getElementById("inp-date").value||todayStr;
  if(!amount||amount<=0){ showToast("Enter a valid amount","#ff6b6b"); return; }
  if(!category){ showToast("Select a category","#ff6b6b"); return; }

  await fetch("/api/expenses",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({amount,category,description,date})
  });

  document.getElementById("inp-amount").value="";
  document.getElementById("inp-desc").value="";
  document.getElementById("inp-date").value=todayStr;
  showToast("✔ Expense added!");
  loadAll();
}

// ── Delete expense ────────────────────────────
async function deleteExpense(id) {
  await fetch(`/api/expenses/${id}`,{method:"DELETE"});
  const el = document.getElementById(`ei-${id}`);
  if(el){ el.style.opacity="0"; el.style.transform="translateX(20px)"; el.style.transition=".25s"; setTimeout(()=>loadAll(),260); }
}

// ── Report modal ──────────────────────────────
function openReport(){
  document.getElementById("modal").classList.add("open");
  generateReport();
}
function closeReport(){ document.getElementById("modal").classList.remove("open"); }

async function generateReport(){
  const month = document.getElementById("report-month").value;
  if(!month) return;
  document.getElementById("spinner").style.display="block";
  document.getElementById("report-output").innerHTML="";
  const res = await fetch(`/api/report?month=${month}`);
  document.getElementById("spinner").style.display="none";
  if(!res.ok){ document.getElementById("report-output").innerHTML=`<div style="color:var(--muted);padding:20px;text-align:center">No data found for this month.</div>`; return; }
  const d = await res.json();
  document.getElementById("report-output").innerHTML=`<img id="report-img" src="data:image/png;base64,${d.image}" alt="Report for ${d.month}"/>`;
}

// ── Helpers ───────────────────────────────────
function fmt(n){ return "₹"+Number(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}); }

let toastTimer;
function showToast(msg, color="#4ade80"){
  const t = document.getElementById("toast");
  t.textContent=msg; t.style.borderColor=color; t.style.color=color;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2800);
}

// ── Month filter ──────────────────────────────
document.getElementById("month-filter").addEventListener("change", loadExpenses);

// ── Keyboard shortcut ─────────────────────────
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeReport(); });

// ── Bootstrap ─────────────────────────────────
loadAll();
</script>
</body>
